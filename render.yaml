services:
  - type: web
    name: comptaauto
    env: python
    region: frankfurt
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn comptaauto.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: comptaauto-db
          property: connectionString
      - key: OCR_SPACE_API_KEY
        value: helloworld
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: comptaauto-db
    region: frankfurt
    plan: free
